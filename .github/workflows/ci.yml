name: Dart CI

on:
  push:
    branches: [main]
    paths:
      - 'typography-dart/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'typography-dart/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - typography_core
          - typography_ru
          - typography_en
    defaults:
      run:
        working-directory: typography-dart/packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Test
        run: dart test

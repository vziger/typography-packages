name: typography_en
description: >-
  English UI micro-typography built on typography_core. Minimal scaffold for now
  (identity passthrough); demonstrates how to add a new language package. Pure
  Dart, no Flutter. Public entry point: en().
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.8.0

dependencies:
  typography_core:
    path: ../typography_core

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
